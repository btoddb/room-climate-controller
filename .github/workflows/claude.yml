# Thin per-repo caller for the shared `@claude` pipeline.
#
# This file is a TEMPLATE, not an active workflow: once <OWNER>/<PIPELINE_REPO>
# exists and is tagged v1, copy this into a consuming repo's
# `.github/workflows/claude.yml` (replacing whatever is there), fill in the
# `with:` block for that repo, and add CLAUDE-pipeline.md's contents to its
# CLAUDE.md. See MIGRATION.md in this folder for the full checklist.
#
# Event triggers and concurrency MUST live in the caller — a reusable workflow
# can't be the event entry point.

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    uses: btoddb/claude-pipeline/.github/workflows/claude.yml@v1
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      maintainer: btoddb
      setup: python # or "node" / "none"
      python-version: "3.14"
      install-command: pip install -r requirements.txt
      plan-allowed-tools: ""
      implement-allowed-tools: "Read,Edit,Write,Glob,Grep,Bash(pytest *),Bash(scripts/lint),Bash(scripts/lint *),Bash(gh pr create *)"
      review-allowed-tools: "BRead,Glob,Grep,Bash(pytest *),Bash(scripts/lint),Bash(scripts/lint *)"
