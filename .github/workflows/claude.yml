name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Serialize runs on the same issue/PR so two @claude mentions can't race on the
# branch. cancel-in-progress is false: a queued run waits rather than killing
# work Claude is mid-way through.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # Parse the @claude command once and route the rest of the pipeline.
  #
  # Commands (the text that mentions @claude):
  #   @claude            -> full pipeline: plan, then implement if no questions
  #                         (issue context); conversational reply (PR context)
  #   @claude plan       -> planning only; the plan is posted as a comment
  #   @claude implement  -> skip planning; implement the latest plan comment and
  #                         open a PR (issue context)
  #   @claude review     -> line-by-line PR review on Opus; comments only, no
  #                         code changes (PR context)
  #
  # Outputs:
  #   route      = plan | implement | review | respond | skip
  #   plan_only  = true  | false   (suppresses the implement phase)
  dispatch:
    if: |
      contains(github.event.comment.body, '@claude') ||
      contains(github.event.review.body, '@claude') ||
      contains(github.event.issue.body, '@claude') ||
      contains(github.event.issue.title, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      route: ${{ steps.route.outputs.route }}
      plan_only: ${{ steps.route.outputs.plan_only }}
    steps:
      - name: Route the @claude command
        id: route
        # Trigger text is passed via env (NOT interpolated into the script) and
        # always quoted, so a malicious issue/comment body can't inject shell.
        env:
          EVENT: ${{ github.event_name }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          PR_URL: ${{ github.event.issue.pull_request.url }}
        run: |
          set -euo pipefail

          # The text carrying the command, per event type.
          case "$EVENT" in
            issues)                      text="$ISSUE_TITLE $ISSUE_BODY" ;;
            issue_comment)               text="$COMMENT_BODY" ;;
            pull_request_review)         text="$REVIEW_BODY" ;;
            pull_request_review_comment) text="$COMMENT_BODY" ;;
            *)                           text="" ;;
          esac

          # Is this a PR context? PR comments carry an issue.pull_request.url;
          # review events are PRs by definition.
          is_pr=false
          case "$EVENT" in
            pull_request_review|pull_request_review_comment) is_pr=true ;;
            issue_comment) if [ -n "$PR_URL" ]; then is_pr=true; fi ;;
          esac

          route=skip
          plan_only=false
          if printf '%s' "$text" | grep -qi '@claude'; then
            if [ "$is_pr" = true ]; then
              # PR context: "@claude review" runs a review; anything else is a
              # conversational reply / follow-up implementation help.
              if printf '%s' "$text" | grep -qiE '@claude[[:space:]]+review([[:space:]]|$)'; then
                route=review
              else
                route=respond
              fi
            # New issue or issue comment -> planning pipeline by default. A
            # subcommand word right after @claude selects a phase.
            elif printf '%s' "$text" | grep -qiE '@claude[[:space:]]+plan([[:space:]]|$)'; then
              route=plan
              plan_only=true
            elif printf '%s' "$text" | grep -qiE '@claude[[:space:]]+implement([[:space:]]|$)'; then
              route=implement
            else
              route=plan
            fi
          fi

          echo "route=$route" >> "$GITHUB_OUTPUT"
          echo "plan_only=$plan_only" >> "$GITHUB_OUTPUT"
          echo "Routed event '$EVENT' (is_pr=$is_pr) -> route=$route plan_only=$plan_only"

  # Conversational @claude on a PR (review work on Opus, follow-up comments on
  # Sonnet).
  respond:
    needs: dispatch
    if: needs.dispatch.outputs.route == 'respond'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Stage CI helper scripts
        # Copy helpers out of the worktree (into RUNNER_TEMP, which is outside
        # the git workspace) BEFORE the action runs. The action may switch the
        # checkout to a PR branch with a different/missing copy, or run
        # `git clean`; staging from the initial (default-branch) checkout means
        # CI always runs main's version of these scripts, never PR-controlled
        # code, regardless of the PR branch.
        run: cp -r .github/scripts "$RUNNER_TEMP/ci-scripts"
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Review -> Opus; follow-up comments -> Sonnet.
          claude_args: |
            --model ${{ github.event_name == 'pull_request_review' && 'claude-opus-4-8' || 'claude-sonnet-4-6' }}
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: bash "$RUNNER_TEMP/ci-scripts/log-model.sh" "${{ github.event.issue.number || github.event.pull_request.number }}" "Response"

  # Review phase: Opus performs a line-by-line PR review. `contents` is read-only
  # so the job structurally cannot change code — it only posts review comments.
  review:
    needs: dispatch
    if: needs.dispatch.outputs.route == 'review'
    runs-on: ubuntu-latest
    env:
      # Single source of truth for this job's --effort, so the log-model.sh
      # comment can't drift from the flag below when this gets bumped.
      CLAUDE_EFFORT: medium
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Stage CI helper scripts
        run: cp -r .github/scripts "$RUNNER_TEMP/ci-scripts"
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install requirements
        run: python3 -m pip install -r requirements.txt
      # No custom `prompt`: that puts the action in agent mode, which does not
      # create the tracking comment, so Claude's review is never posted. Running
      # in tag mode (responding to the "@claude review" comment) posts the result
      # as a comment. Review behavior is driven by the "Review (Opus)" section of
      # CLAUDE.md, which tag mode reads.
      #
      # --allowedTools is a full replacement list (see the implement job's
      # comment), so the file tools are listed alongside the Bash grant even
      # though review never edits code — CLAUDE.md's "never make changes"
      # constraint is enforced by leaving Edit/Write off this list.
      - name: Review (Opus)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # TODO: bump to --effort xhigh once the plan/implement/review pipeline
          # is stable — review is the pre-merge safety net, worth the extra
          # reasoning depth. Medium for now while we're still ironing out CI.
          claude_args: |
            --model claude-opus-4-8
            --effort ${{ env.CLAUDE_EFFORT }}
            --allowedTools "Read,Glob,Grep,Bash(pytest *),Bash(scripts/lint),Bash(scripts/lint *)"
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: bash "$RUNNER_TEMP/ci-scripts/log-model.sh" "${{ github.event.issue.number || github.event.pull_request.number }}" "Review" "${{ env.CLAUDE_EFFORT }}"

  # Planning phase: Opus reads the codebase and posts a plan comment. It does NOT
  # write code. The job then inspects the plan comment to decide whether
  # implementation may proceed automatically.
  plan:
    needs: dispatch
    if: needs.dispatch.outputs.route == 'plan'
    runs-on: ubuntu-latest
    env:
      # Single source of truth for this job's --effort, so the log-model.sh
      # comment can't drift from the flag below when this gets bumped.
      CLAUDE_EFFORT: medium
    permissions:
      contents: read
      issues: write
      id-token: write
    outputs:
      # 'true' only when the latest plan comment carries the no-questions marker.
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Stage CI helper scripts
        run: cp -r .github/scripts "$RUNNER_TEMP/ci-scripts"
      # Record a high-water mark *before* the model runs so the gate can locate
      # the comment this run produces purely by timestamp — no dependence on the
      # model self-declaring its plan with a literal marker.
      - name: Snapshot comment timeline
        id: snapshot
        run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      # No custom `prompt` — see the review job. Tag mode posts the plan as a
      # comment; a custom prompt would silently swallow it. Planning behavior
      # (write the plan; use `[QUESTION]` + @btoddb when blocked) is driven by
      # the "Planning (Opus)" section of CLAUDE.md, which tag mode reads. The
      # machine markers are stamped by the gate step below, NOT by the model.
      - name: Plan (Opus)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # TODO: bump to --effort xhigh once the plan/implement/review pipeline
          # is stable — a weak plan cascades into a wrong implementation, so
          # this is the highest-leverage spot for extra reasoning depth.
          # Medium for now while we're still ironing out CI.
          claude_args: |
            --model claude-opus-4-8
            --effort ${{ env.CLAUDE_EFFORT }}
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: bash "$RUNNER_TEMP/ci-scripts/log-model.sh" "${{ github.event.issue.number }}" "Planning" "${{ env.CLAUDE_EFFORT }}"
      # Locate the plan, decide proceed-vs-park, and stamp the machine markers
      # ourselves. The model only writes plan *content* (and `[QUESTION]` items
      # when blocked) — it never has to remember a literal marker, which was the
      # single point of failure that silently skipped implementation. Runs even
      # if the Plan step failed, so a missing plan is reported loudly, not as a
      # silent green skip.
      - name: Stamp markers and decide whether to auto-implement
        id: gate
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          STARTED_AT: ${{ steps.snapshot.outputs.started_at }}
          PLAN_ONLY: ${{ needs.dispatch.outputs.plan_only }}
        run: |
          set -euo pipefail

          # The plan is the newest comment created during this run that was NOT
          # posted by our own github-actions bot (status/model-log comments).
          # Located by timestamp + author — deterministic, no marker needed.
          plan="$(gh issue view "$ISSUE" --repo "$REPO" --json comments \
            --jq '[.comments[]
                   | select(.author.login != "github-actions")
                   | select(.createdAt > "'"$STARTED_AT"'")]
                  | last | .body // ""')"

          if [ -z "$plan" ]; then
            # No plan was produced (model error, timeout, or a failed post).
            # Never skip silently: alert @btoddb and fail the run so it's red.
            gh issue comment "$ISSUE" --repo "$REPO" --body \
              "🤖 @btoddb planning ran but produced **no plan comment**, so the pipeline could not hand off to implementation. Please re-run \`@claude plan\`. (This run is failed on purpose so the break is visible rather than a silent skip.)"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::error::Planning produced no plan comment; failing so the skip is never silent."
            exit 1
          fi

          # Open questions => park for a human. The model writes these as
          # `[QUESTION]` items (required by CLAUDE.md), so that substring is the
          # machine signal — no separate proceed marker for the model to forget.
          has_questions=false
          printf '%s' "$plan" | grep -q '\[QUESTION\]' && has_questions=true

          # @claude plan is planning-only: stamp the plan marker (so a later
          # @claude implement can find it) but never auto-proceed.
          proceed=false
          if [ "$has_questions" = false ] && [ "$PLAN_ONLY" != "true" ]; then
            proceed=true
          fi

          if [ "$proceed" = true ]; then
            body="$(printf '%s\n%s\n\n%s\n' \
              '<!-- claude:plan -->' '<!-- claude:proceed -->' \
              '🤖 Plan has no open questions — proceeding to implementation.')"
          elif [ "$has_questions" = true ]; then
            body="$(printf '%s\n\n%s\n' '<!-- claude:plan -->' \
              '🤖 @btoddb the plan above has open `[QUESTION]` items — implementation is parked until they are resolved. Reply with answers, then comment `@claude` to re-plan, or `@claude implement` to build it as-is.')"
          else
            body="$(printf '%s\n\n%s\n' '<!-- claude:plan -->' \
              '🤖 Plan-only run — implementation was not started. Comment `@claude implement` to build this plan.')"
          fi
          gh issue comment "$ISSUE" --repo "$REPO" --body "$body"

          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"
          echo "Plan located (has_questions=$has_questions, plan_only=$PLAN_ONLY, proceed=$proceed)."

  # Implementation phase: Sonnet implements the latest plan comment and opens the
  # PR. Fires either as the auto-handoff after `plan` (a full @claude command
  # whose plan left no open questions) or directly via @claude implement.
  implement:
    needs: [dispatch, plan]
    if: >-
      ${{ !cancelled() && (
        needs.dispatch.outputs.route == 'implement' ||
        (needs.plan.result == 'success' && needs.plan.outputs.proceed == 'true' && needs.dispatch.outputs.plan_only == 'false')
      ) }}
    runs-on: ubuntu-latest
    env:
      # Single source of truth for this job's --effort, so the log-model.sh
      # comment can't drift from the flag below when this gets bumped.
      CLAUDE_EFFORT: medium
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Ensure a plan exists
        id: check_plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Implementation needs a plan to build. (For the auto-handoff path the
          # plan was just posted; this mainly guards a direct @claude implement.)
          body="$(gh issue view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json comments \
            --jq '[.comments[] | select(.body | contains("claude:plan"))] | last | .body // ""')"
          if [ -z "$body" ]; then
            echo "No plan comment found; skipping implementation."
            gh issue comment "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --body "🤖 \`@claude implement\` found no plan to build. Run \`@claude plan\` first, or \`@claude\` for the full pipeline."
            echo "has_plan=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_plan=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout repository
        if: steps.check_plan.outputs.has_plan == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so a feature branch + PR can be created
      - name: Stage CI helper scripts
        if: steps.check_plan.outputs.has_plan == 'true'
        run: cp -r .github/scripts "$RUNNER_TEMP/ci-scripts"
      - name: Set up Python
        if: steps.check_plan.outputs.has_plan == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install requirements
        if: steps.check_plan.outputs.has_plan == 'true'
        run: python3 -m pip install -r requirements.txt
      # No custom `prompt` — see the review job. Tag mode lets the action open
      # the PR and post results; a custom prompt would run in agent mode and
      # swallow the output. Implementation behavior (build the most recent plan
      # Opus wrote in the thread, feature branch only, open a PR) is driven by
      # the "Implementation (Sonnet)" section of CLAUDE.md, which tag mode reads.
      - name: Implement (Sonnet)
        id: claude
        if: steps.check_plan.outputs.has_plan == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # No `additional_permissions: workflows: write` here: the Claude
          # GitHub App's installation has no workflow-write permission at all
          # (by design, per anthropics/claude-code-action's FAQ) and this
          # input can't grant what the App's own permission set excludes. A
          # branch that includes .github/workflows/ (i.e. every branch in
          # this repo) will always fail to push from this job — confirmed by
          # the "refusing to allow a GitHub App to create or update workflow"
          # rejection on issue #28's attempted push. If Claude can't push,
          # push the branch yourself from the local commit it leaves behind.
          # --allowedTools is a full replacement list, not an addition to the
          # action's defaults: omitting Read/Edit/Write/Glob/Grep here aborts
          # the run the instant Claude tries one (confirmed — an earlier
          # version of this line only listed the Bash entries and every run
          # died at the first `Read`, 0/7 todos checked off). List the normal
          # file tools explicitly alongside the Bash grant.
          #
          # TODO: bump to --effort high (Sonnet 4.6's default) once the
          # pipeline is stable. Medium for now while we're still ironing out
          # CI — don't go to `max`, the docs warn it's prone to overthinking
          # on mechanical execution work like this job.
          claude_args: |
            --model claude-sonnet-4-6
            --effort ${{ env.CLAUDE_EFFORT }}
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(pytest *),Bash(scripts/lint),Bash(scripts/lint *)"
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
          BRANCH_NAME: ${{ steps.claude.outputs.branch_name }}
        run: |
          # Prefer commenting on the PR this phase opened; fall back to the issue.
          target="${{ github.event.issue.number }}"
          if [ -n "$BRANCH_NAME" ]; then
            pr="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH_NAME" \
              --json number --jq '.[0].number // ""')"
            [ -n "$pr" ] && target="$pr"
          fi
          bash "$RUNNER_TEMP/ci-scripts/log-model.sh" "$target" "Implementation" "${{ env.CLAUDE_EFFORT }}"
