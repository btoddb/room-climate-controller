name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Serialize runs on the same issue/PR so two @claude mentions can't race on the
# branch. cancel-in-progress is false: a queued run waits rather than killing
# work Claude is mid-way through.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # Human-driven @claude on existing comments / PR reviews. Review work runs on
  # Opus; iterative follow-up comments run on Sonnet.
  respond:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Review -> Opus; follow-up comments -> Sonnet.
          claude_args: |
            --model ${{ github.event_name == 'pull_request_review' && 'claude-opus-4-8' || 'claude-sonnet-4-6' }}
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: bash .github/scripts/log-model.sh "${{ github.event.issue.number || github.event.pull_request.number }}" "Response"

  # Phase 1 of the new-issue pipeline: Opus reads the codebase and posts a plan.
  # It does NOT write code. The job then inspects the plan comment to decide
  # whether implementation may proceed automatically.
  plan:
    if: github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    outputs:
      # 'true' only when Opus's plan comment carries the no-questions marker.
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Plan (Opus)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-opus-4-8
          prompt: |
            A new issue was opened. Read the codebase and produce a structural
            implementation plan, following the "GitHub Workflow" section of
            CLAUDE.md. Post the plan as a comment on this issue, and include the
            exact line `<!-- claude:plan -->` in it so the comment can be found
            later. Do NOT write any code in this run.

            If you have zero [QUESTION] items, also include the exact line
            `<!-- claude:proceed -->` to authorize automatic implementation.
            If you have any [QUESTION] items, do NOT include the proceed marker;
            instead @-mention @btoddb in the comment so they are notified to
            answer.
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: bash .github/scripts/log-model.sh "${{ github.event.issue.number }}" "Planning"
      - name: Decide whether to auto-implement
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the most recent comment tagged as a plan (revisions are posted
          # as new tagged comments), then proceed only if it carries the marker.
          body="$(gh issue view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json comments \
            --jq '[.comments[] | select(.body | contains("claude:plan"))] | last | .body // ""')"
          if [ -z "$body" ]; then
            echo "No plan comment found; not implementing."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$body" | grep -q 'claude:proceed'; then
            echo "Latest plan has no open questions; implementation will proceed."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Latest plan has open questions (or no marker); waiting for @btoddb."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  # Phase 2 of the new-issue pipeline: Sonnet implements the approved plan and
  # opens the PR. Runs in the same workflow run as `plan`, only when the plan
  # left no open questions.
  implement:
    needs: plan
    if: needs.plan.result == 'success' && needs.plan.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so a feature branch + PR can be created
      - name: Implement (Sonnet)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-6
          prompt: |
            Implement the approved plan on this issue, following CLAUDE.md
            exactly. The plan is in the most recent issue comment containing the
            line `<!-- claude:plan -->`; use that comment as the source of truth.
            NEVER commit to main: create a feature branch, implement the change,
            run the project's lint and tests, and open a Pull Request that
            references this issue.
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
          BRANCH_NAME: ${{ steps.claude.outputs.branch_name }}
        run: |
          # Prefer commenting on the PR this phase opened; fall back to the issue.
          target="${{ github.event.issue.number }}"
          if [ -n "$BRANCH_NAME" ]; then
            pr="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH_NAME" \
              --json number --jq '.[0].number // ""')"
            [ -n "$pr" ] && target="$pr"
          fi
          bash .github/scripts/log-model.sh "$target" "Implementation"
