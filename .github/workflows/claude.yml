name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Serialize runs on the same issue/PR so two @claude mentions can't race on the
# branch. cancel-in-progress is false: a queued run waits rather than killing
# work Claude is mid-way through.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # Parse the @claude command once and route the rest of the pipeline.
  #
  # Commands (the text that mentions @claude):
  #   @claude            -> full pipeline: plan, then implement if no questions
  #                         (issue context); conversational reply (PR context)
  #   @claude plan       -> planning only; the plan is posted as a comment
  #   @claude implement  -> skip planning; implement the latest plan comment and
  #                         open a PR (issue context)
  #   @claude review     -> line-by-line PR review on Opus; comments only, no
  #                         code changes (PR context)
  #
  # Outputs:
  #   route      = plan | implement | review | respond | skip
  #   plan_only  = true  | false   (suppresses the implement phase)
  dispatch:
    if: |
      contains(github.event.comment.body, '@claude') ||
      contains(github.event.review.body, '@claude') ||
      contains(github.event.issue.body, '@claude') ||
      contains(github.event.issue.title, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      route: ${{ steps.route.outputs.route }}
      plan_only: ${{ steps.route.outputs.plan_only }}
    steps:
      - name: Route the @claude command
        id: route
        # Trigger text is passed via env (NOT interpolated into the script) and
        # always quoted, so a malicious issue/comment body can't inject shell.
        env:
          EVENT: ${{ github.event_name }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          PR_URL: ${{ github.event.issue.pull_request.url }}
        run: |
          set -euo pipefail

          # The text carrying the command, per event type.
          case "$EVENT" in
            issues)                      text="$ISSUE_TITLE $ISSUE_BODY" ;;
            issue_comment)               text="$COMMENT_BODY" ;;
            pull_request_review)         text="$REVIEW_BODY" ;;
            pull_request_review_comment) text="$COMMENT_BODY" ;;
            *)                           text="" ;;
          esac

          # Is this a PR context? PR comments carry an issue.pull_request.url;
          # review events are PRs by definition.
          is_pr=false
          case "$EVENT" in
            pull_request_review|pull_request_review_comment) is_pr=true ;;
            issue_comment) if [ -n "$PR_URL" ]; then is_pr=true; fi ;;
          esac

          route=skip
          plan_only=false
          if printf '%s' "$text" | grep -qi '@claude'; then
            if [ "$is_pr" = true ]; then
              # PR context: "@claude review" runs a review; anything else is a
              # conversational reply / follow-up implementation help.
              if printf '%s' "$text" | grep -qiE '@claude[[:space:]]+review([[:space:]]|$)'; then
                route=review
              else
                route=respond
              fi
            # New issue or issue comment -> planning pipeline by default. A
            # subcommand word right after @claude selects a phase.
            elif printf '%s' "$text" | grep -qiE '@claude[[:space:]]+plan([[:space:]]|$)'; then
              route=plan
              plan_only=true
            elif printf '%s' "$text" | grep -qiE '@claude[[:space:]]+implement([[:space:]]|$)'; then
              route=implement
            else
              route=plan
            fi
          fi

          echo "route=$route" >> "$GITHUB_OUTPUT"
          echo "plan_only=$plan_only" >> "$GITHUB_OUTPUT"
          echo "Routed event '$EVENT' (is_pr=$is_pr) -> route=$route plan_only=$plan_only"

  # Conversational @claude on a PR (review work on Opus, follow-up comments on
  # Sonnet).
  respond:
    needs: dispatch
    if: needs.dispatch.outputs.route == 'respond'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Stage CI helper scripts
        # Copy helpers out of the worktree (into RUNNER_TEMP, which is outside
        # the git workspace) BEFORE the action runs. The action may switch the
        # checkout to a PR branch with a different/missing copy, or run
        # `git clean`; staging from the initial (default-branch) checkout means
        # CI always runs main's version of these scripts, never PR-controlled
        # code, regardless of the PR branch.
        run: cp -r .github/scripts "$RUNNER_TEMP/ci-scripts"
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Review -> Opus; follow-up comments -> Sonnet.
          claude_args: |
            --model ${{ github.event_name == 'pull_request_review' && 'claude-opus-4-8' || 'claude-sonnet-4-6' }}
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: bash "$RUNNER_TEMP/ci-scripts/log-model.sh" "${{ github.event.issue.number || github.event.pull_request.number }}" "Response"

  # Review phase: Opus performs a line-by-line PR review. `contents` is read-only
  # so the job structurally cannot change code — it only posts review comments.
  review:
    needs: dispatch
    if: needs.dispatch.outputs.route == 'review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Stage CI helper scripts
        run: cp -r .github/scripts "$RUNNER_TEMP/ci-scripts"
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install requirements
        run: python3 -m pip install -r requirements.txt
      # No custom `prompt`: that puts the action in agent mode, which does not
      # create the tracking comment, so Claude's review is never posted. Running
      # in tag mode (responding to the "@claude review" comment) posts the result
      # as a comment. Review behavior is driven by the "Review (Opus)" section of
      # CLAUDE.md, which tag mode reads.
      #
      # --allowedTools is a full replacement list (see the implement job's
      # comment), so the file tools are listed alongside the Bash grant even
      # though review never edits code — CLAUDE.md's "never make changes"
      # constraint is enforced by leaving Edit/Write off this list.
      - name: Review (Opus)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-8
            --allowedTools "Read,Glob,Grep,Bash(pytest *),Bash(scripts/lint),Bash(scripts/lint *)"
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: bash "$RUNNER_TEMP/ci-scripts/log-model.sh" "${{ github.event.issue.number || github.event.pull_request.number }}" "Review"

  # Planning phase: Opus reads the codebase and posts a plan comment. It does NOT
  # write code. The job then inspects the plan comment to decide whether
  # implementation may proceed automatically.
  plan:
    needs: dispatch
    if: needs.dispatch.outputs.route == 'plan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    outputs:
      # 'true' only when the latest plan comment carries the no-questions marker.
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Stage CI helper scripts
        run: cp -r .github/scripts "$RUNNER_TEMP/ci-scripts"
      # No custom `prompt` — see the review job. Tag mode posts the plan as a
      # comment; a custom prompt would silently swallow it. Planning behavior
      # (the `<!-- claude:plan -->` / `<!-- claude:proceed -->` markers, the
      # @btoddb-on-questions rule, plan-only vs full) is driven by the
      # "Planning (Opus)" section of CLAUDE.md, which tag mode reads.
      - name: Plan (Opus)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-8
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: bash "$RUNNER_TEMP/ci-scripts/log-model.sh" "${{ github.event.issue.number }}" "Planning"
      - name: Decide whether to auto-implement
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the most recent comment tagged as a plan (revisions are posted
          # as new tagged comments), then proceed only if it carries the marker.
          body="$(gh issue view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json comments \
            --jq '[.comments[] | select(.body | contains("claude:plan"))] | last | .body // ""')"
          if [ -z "$body" ]; then
            echo "No plan comment found; not implementing."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$body" | grep -q 'claude:proceed'; then
            echo "Latest plan has no open questions; implementation will proceed."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Latest plan has open questions (or no marker); waiting for @btoddb."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  # Implementation phase: Sonnet implements the latest plan comment and opens the
  # PR. Fires either as the auto-handoff after `plan` (a full @claude command
  # whose plan left no open questions) or directly via @claude implement.
  implement:
    needs: [dispatch, plan]
    if: >-
      ${{ !cancelled() && (
        needs.dispatch.outputs.route == 'implement' ||
        (needs.plan.result == 'success' && needs.plan.outputs.proceed == 'true' && needs.dispatch.outputs.plan_only == 'false')
      ) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Ensure a plan exists
        id: check_plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Implementation needs a plan to build. (For the auto-handoff path the
          # plan was just posted; this mainly guards a direct @claude implement.)
          body="$(gh issue view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json comments \
            --jq '[.comments[] | select(.body | contains("claude:plan"))] | last | .body // ""')"
          if [ -z "$body" ]; then
            echo "No plan comment found; skipping implementation."
            gh issue comment "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --body "🤖 \`@claude implement\` found no plan to build. Run \`@claude plan\` first, or \`@claude\` for the full pipeline."
            echo "has_plan=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_plan=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout repository
        if: steps.check_plan.outputs.has_plan == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so a feature branch + PR can be created
      - name: Stage CI helper scripts
        if: steps.check_plan.outputs.has_plan == 'true'
        run: cp -r .github/scripts "$RUNNER_TEMP/ci-scripts"
      - name: Set up Python
        if: steps.check_plan.outputs.has_plan == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install requirements
        if: steps.check_plan.outputs.has_plan == 'true'
        run: python3 -m pip install -r requirements.txt
      # No custom `prompt` — see the review job. Tag mode lets the action open
      # the PR and post results; a custom prompt would run in agent mode and
      # swallow the output. Implementation behavior (build the most recent
      # `<!-- claude:plan -->` comment, feature branch only, open a PR) is driven
      # by the "Implementation (Sonnet)" section of CLAUDE.md, which tag mode
      # reads.
      - name: Implement (Sonnet)
        id: claude
        if: steps.check_plan.outputs.has_plan == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            workflows: write
          # --allowedTools is a full replacement list, not an addition to the
          # action's defaults: omitting Read/Edit/Write/Glob/Grep here aborts
          # the run the instant Claude tries one (confirmed — an earlier
          # version of this line only listed the Bash entries and every run
          # died at the first `Read`, 0/7 todos checked off). List the normal
          # file tools explicitly alongside the Bash grant.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(pytest *),Bash(scripts/lint),Bash(scripts/lint *)"
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
          BRANCH_NAME: ${{ steps.claude.outputs.branch_name }}
        run: |
          # Prefer commenting on the PR this phase opened; fall back to the issue.
          target="${{ github.event.issue.number }}"
          if [ -n "$BRANCH_NAME" ]; then
            pr="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH_NAME" \
              --json number --jq '.[0].number // ""')"
            [ -n "$pr" ] && target="$pr"
          fi
          bash "$RUNNER_TEMP/ci-scripts/log-model.sh" "$target" "Implementation"
