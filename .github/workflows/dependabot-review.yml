name: Dependabot Claude Review

# Dependabot has no built-in way to post a follow-up comment or template the
# PR description, so we post the "@claude review" trigger ourselves. This must
# use a PAT, not GITHUB_TOKEN, because GITHUB_TOKEN-created comments do not
# trigger the follow-up issue_comment workflow.
on:
  pull_request:
    types: [opened]

permissions: {}

jobs:
  trigger-review:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Verify PAT secret
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_REVIEW_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Missing DEPENDABOT_REVIEW_PAT. Add it as a Dependabot secret so Dependabot-triggered runs can read it."
            exit 1
          fi

      - name: Comment "@claude review"
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_REVIEW_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "@claude review"
