name: Report failure
description: >
  Post a comment tagging the maintainer when a Claude phase fails outright
  (usage/token limit, API error, timeout). Without this, a hard failure
  mid-run leaves the Actions tab red with no comment at all.

inputs:
  number:
    description: Issue or PR number to comment on (gh accepts a PR number too, since PRs are issues)
    required: true
  phase:
    description: Phase label to show in the comment (e.g. "Planning", "Implementation")
    required: true
  execution-file:
    description: Path to the claude-code-action execution_file output, used to classify the failure
    required: false
    default: ""
  maintainer:
    description: GitHub username to @-mention in the failure comment
    required: true
  github-token:
    description: Token with issues:write used to post the comment
    required: true

runs:
  using: composite
  steps:
    - name: Report failure
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        EXECUTION_FILE: ${{ inputs.execution-file }}
        NUMBER: ${{ inputs.number }}
        PHASE: ${{ inputs.phase }}
        MAINTAINER: ${{ inputs.maintainer }}
      run: |
        set -euo pipefail

        run_url="${GITHUB_SERVER_URL:-https://github.com}/${GITHUB_REPOSITORY:-}/actions/runs/${GITHUB_RUN_ID:-}"

        error_text=""
        if [ -n "${EXECUTION_FILE:-}" ] && [ -f "$EXECUTION_FILE" ]; then
          # Same defensive slurp style as log-model: the execution log's schema
          # isn't formally documented, so pull any error-ish text out of the last
          # result object rather than assuming a fixed shape.
          error_text="$(jq -rs '
              [.. | objects | select(has("is_error") or has("error") or has("subtype"))]
              | last
              | [.error, .subtype, (if .is_error == true then "is_error" else empty end)]
              | map(select(. != null and . != ""))
              | join(" ")
            ' "$EXECUTION_FILE" 2>/dev/null || true)"
          # Collapse to one line and cap the length — the log schema is undocumented,
          # so a stray backtick or newline in error/subtype shouldn't break the
          # inline-code formatting of the posted comment.
          error_text="$(printf '%s' "$error_text" | tr '\n' ' ' | tr -d '`' | cut -c1-300)"
        fi

        # Heuristic classification: match known usage/token/rate-limit signatures.
        # This is best-effort string matching against an undocumented log format,
        # so a miss here just falls through to the generic message below.
        is_usage_limit=false
        if printf '%s' "$error_text" | grep -qiE 'usage limit|rate.?limit|quota|token.?limit|exceeded.*usage|429'; then
          is_usage_limit=true
        fi

        if [ "$is_usage_limit" = true ]; then
          reason="the bot likely hit its usage/token limit"
          advice="Please wait for the limit window to reset, then re-comment \`@claude ...\` to retry."
        else
          reason="this phase failed"
          advice="Please check the [Actions run](${run_url}) for details, then re-comment \`@claude ...\` to retry."
        fi

        snippet=""
        [ -n "$error_text" ] && snippet=" Error detail: \`${error_text}\`."

        gh issue comment "$NUMBER" \
          --repo "${GITHUB_REPOSITORY:?}" \
          --body "🤖 @${MAINTAINER} the **${PHASE}** phase failed — ${reason}.${snippet} ${advice}"
